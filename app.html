<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FitHub Personal — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --bg-card: #161616;
    --bg-input: #1f1f1f;
    --bg-hover: #1c1c1c;
    --line: #262626;
    --line-2: #333333;
    --text: #f5f5f0;
    --muted: #a3a3a3;
    --muted-2: #6b7280;
    --lime: #bef264;
    --lime-dim: rgba(190,242,100,0.15);
    --red: #fb7185;
    --red-dim: rgba(251,113,133,0.12);
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; }
  a { color: inherit; }

  /* ============== HEADER ============== */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--lime); border-radius: 6px;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    color: #0a0a0a; font-weight: 700; font-size: 16px;
  }
  .brand-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 0.04em;
  }
  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; color: var(--lime);
    padding: 3px 7px; border: 1px solid var(--lime);
    border-radius: 4px; text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .user-box { display: flex; align-items: center; gap: 12px; }
  .user-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
  }
  .user-name strong { color: var(--text); font-weight: 500; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--line);
    color: var(--muted); padding: 8px 14px;
    border-radius: 6px; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--line-2); }

  /* ============== TAB BAR ============== */
  .tabbar {
    position: sticky; top: 65px; z-index: 40;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .tabbar-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 0 24px;
    display: flex; gap: 4px;
    overflow-x: auto;
  }
  .tab-btn {
    background: transparent; border: none; color: var(--muted);
    padding: 16px 18px;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px; white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--lime);
    border-bottom-color: var(--lime);
  }
  .tab-btn .badge {
    display: inline-block;
    margin-left: 6px;
    background: var(--line);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 1px 6px; border-radius: 10px;
    font-weight: 700;
  }
  .tab-btn.active .badge { background: var(--lime); color: #0a0a0a; }

  /* ============== MAIN ============== */
  main {
    max-width: 1280px; margin: 0 auto;
    padding: 24px;
  }
  .section { display: none; }
  .section.active { display: block; }

  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; letter-spacing: 0.02em; line-height: 1;
  }
  .section-sub {
    color: var(--muted); font-size: 13px;
    margin-top: 4px;
  }
  .section-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* ============== BUTTONS ============== */
  .btn {
    border: none; border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    transition: transform 0.1s, opacity 0.2s, background 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--lime); color: #0a0a0a; }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-secondary {
    background: var(--bg-card); color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover { border-color: var(--line-2); background: var(--bg-hover); }
  .btn-danger {
    background: var(--red-dim); color: var(--red);
    border: 1px solid rgba(251,113,133,0.3);
  }
  .btn-danger:hover { background: rgba(251,113,133,0.2); }
  .btn-sm { padding: 6px 10px; font-size: 11px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ============== DATE PICKER (Agenda) ============== */
  .date-nav {
    display: flex; gap: 6px; align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px;
  }
  .date-nav button {
    background: transparent; border: none; color: var(--muted);
    padding: 6px 12px; border-radius: 4px; font-size: 14px;
    transition: all 0.2s;
  }
  .date-nav button:hover { background: var(--bg-hover); color: var(--text); }
  .date-display {
    padding: 0 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    border-left: 1px solid var(--line);
    border-right: 1px solid var(--line);
    text-align: center; min-width: 160px;
  }
  .date-display strong { color: var(--lime); }
  .date-pick {
    background: transparent !important;
    color: var(--muted);
    border: none; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 6px 10px; border-radius: 4px;
  }
  .date-pick input { display: none; }

  /* ============== AGENDA GRID ============== */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .slot {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .slot:hover { border-color: var(--line-2); }
  .slot.has-checkins { border-color: rgba(190,242,100,0.3); }
  .slot-head {
    padding: 10px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
  }
  .slot-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--lime);
  }
  .slot-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
  }
  .slot-body { padding: 8px; }
  .checkin {
    background: var(--bg-input);
    border-left: 3px solid var(--lime);
    border-radius: 4px;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .checkin:hover { background: var(--bg-hover); }
  .checkin-name { font-weight: 600; }
  .checkin-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .gym-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .suggestion {
    background: transparent;
    border: 1px dashed var(--line-2);
    border-radius: 4px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 11px; color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
    transition: all 0.2s;
  }
  .suggestion:hover {
    border-color: var(--lime);
    color: var(--text);
    background: var(--lime-dim);
  }
  .suggestion-label { font-size: 10px; font-family: 'JetBrains Mono', monospace; }
  .slot-add {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line);
    border-radius: 4px;
    color: var(--muted);
    padding: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .slot-add:hover {
    border-color: var(--lime);
    color: var(--lime);
  }

  /* ============== ALUNOS / ACADEMIAS CARDS ============== */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }
  .item-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    transition: border-color 0.2s;
  }
  .item-card:hover { border-color: var(--line-2); }
  .item-card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px; margin-bottom: 10px;
  }
  .item-name {
    font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .item-name .gym-dot { width: 12px; height: 12px; }
  .item-meta {
    color: var(--muted); font-size: 13px;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 6px;
  }
  .item-meta .mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted-2);
  }
  .schedule-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .schedule-chip {
    background: var(--bg-input);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 4px;
  }
  .item-actions {
    display: flex; gap: 6px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  /* ============== RELATÓRIOS ============== */
  .report-controls {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: flex-end;
  }
  .control-group { display: flex; flex-direction: column; gap: 6px; }
  .control-group label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .select {
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    min-width: 220px;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .kpi-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .kpi-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; line-height: 1;
    color: var(--lime);
  }
  .kpi-value .unit {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 18px; color: var(--muted);
    margin-left: 4px;
  }
  .kpi-sub {
    margin-top: 4px;
    font-size: 11px; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .panel {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  /* Calendar grid */
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-head {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    padding: 6px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    background: var(--bg-input);
    border-radius: 4px;
    display: grid; place-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted-2);
    border: 1px solid transparent;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.trained {
    background: var(--lime);
    color: #0a0a0a;
    font-weight: 700;
    border-color: var(--lime);
  }
  .cal-day.today {
    border-color: var(--lime);
    color: var(--lime);
  }

  /* Bar chart */
  .bar-row {
    display: grid;
    grid-template-columns: 110px 1fr 40px;
    gap: 10px; align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .bar-label { color: var(--text); }
  .bar-track {
    background: var(--bg-input);
    height: 18px; border-radius: 3px;
    position: relative; overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--lime);
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .bar-count {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    font-size: 11px;
  }

  /* Gym distribution rows */
  .gym-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .gym-row:last-child { border-bottom: none; }
  .gym-row .gym-dot { width: 12px; height: 12px; }
  .gym-row-name { flex: 1; font-size: 13px; }
  .gym-row-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--muted);
  }

  /* ============== EMPTY STATE ============== */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon {
    font-size: 40px;
    opacity: 0.4;
    margin-bottom: 12px;
  }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .empty-sub { font-size: 13px; margin-bottom: 20px; }

  /* ============== MODAL ============== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    width: 100%; max-width: 540px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .modal-head {
    padding: 18px 22px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0;
    background: var(--bg-card);
    z-index: 1;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; letter-spacing: 0.02em;
  }
  .modal-close {
    background: transparent; border: none;
    color: var(--muted); font-size: 24px;
    padding: 0 6px;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 22px; }
  .modal-actions {
    padding: 16px 22px;
    border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: flex-end;
    position: sticky; bottom: 0;
    background: var(--bg-card);
  }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--lime);
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .muscle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px;
  }
  .muscle-chip {
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    user-select: none;
  }
  .muscle-chip:hover { border-color: var(--line-2); }
  .muscle-chip.selected {
    background: var(--lime-dim);
    border-color: var(--lime);
    color: var(--lime);
    font-weight: 600;
  }

  .color-swatches {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .swatch {
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch.selected {
    border-color: var(--text);
    box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px var(--text);
  }

  .schedule-editor { display: flex; flex-direction: column; gap: 6px; }
  .schedule-row {
    display: grid;
    grid-template-columns: 1fr 1fr 32px;
    gap: 6px; align-items: center;
  }
  .schedule-row select, .schedule-row input {
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 13px;
  }
  .schedule-row button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--red);
    border-radius: 4px;
    padding: 6px;
    font-size: 14px;
  }
  .schedule-row button:hover { background: var(--red-dim); }
  .add-schedule-btn {
    background: transparent;
    border: 1px dashed var(--line-2);
    color: var(--muted);
    border-radius: 4px;
    padding: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-top: 4px;
    width: 100%;
  }
  .add-schedule-btn:hover { color: var(--lime); border-color: var(--lime); }

  /* ============== TOAST ============== */
  .toast-wrap {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left-width: 3px;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    max-width: 360px;
    pointer-events: auto;
    animation: toastIn 0.25s ease;
  }
  .toast.success { border-left-color: var(--lime); }
  .toast.error { border-left-color: var(--red); color: var(--red); }
  .toast.info { border-left-color: #60a5fa; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============== LOADING ============== */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0.6);
    z-index: 150;
    display: none;
    align-items: center; justify-content: center;
  }
  .loading-overlay.open { display: flex; }
  .spinner-big {
    width: 36px; height: 36px;
    border: 3px solid var(--line);
    border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============== EXPORT TEXT BOX ============== */
  .export-box {
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px;

<script>
/* ===================================================================
   FitHub Personal — Dashboard SPA
   =================================================================== */

if (!Session.requireLogin()) { /* redirected */ }

/* ===================== STATE ===================== */
const state = {
  alunos: [],
  academias: [],
  treinos: [],
  loaded: false,
  currentDate: todayISO(),
  currentTab: 'agenda',
};

/* ===================== HELPERS ===================== */
function $(sel, parent = document) { return parent.querySelector(sel); }
function $$(sel, parent = document) { return Array.from(parent.querySelectorAll(sel)); }

// força valor a string (evita .replace etc em number/bool do Sheets)
function s(v) { return v == null ? '' : String(v); }

// normaliza Musculos vindos da planilha (pode ser array OU string CSV)
function muscArray(m) {
  if (Array.isArray(m)) return m;
  if (typeof m === 'string') return m.split(',').map(x => x.trim()).filter(Boolean);
  return [];
}

// normaliza Horarios (pode ser array, JSON string, ou vazio)
function horariosArray(h) {
  if (Array.isArray(h)) return h;
  if (typeof h === 'string' && h.trim()) {
    try { const parsed = JSON.parse(h); return Array.isArray(parsed) ? parsed : []; }
    catch { return []; }
  }
  return [];
}

// Sheets converte strings de data/hora em Date objects internos.
// Ao serializar em JSON, viram ISO ("2026-05-22T03:00:00.000Z").
// Esses helpers desfazem essa conversão pra YYYY-MM-DD e HH:MM.
function normDate(v) {
  if (!v) return '';
  if (v instanceof Date) {
    return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  }
  const str = String(v);
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
  if (/^\d{4}-\d{2}-\d{2}T/.test(str)) return str.slice(0, 10);
  return str;
}
function normTime(v) {
  if (!v) return '';
  if (v instanceof Date) {
    return `${String(v.getHours()).padStart(2,'0')}:${String(v.getMinutes()).padStart(2,'0')}`;
  }
  const str = String(v);
  if (/^\d{1,2}:\d{2}/.test(str)) {
    const [h, m] = str.split(':');
    return `${h.padStart(2,'0')}:${m.slice(0,2)}`;
  }
  if (/^\d{4}-\d{2}-\d{2}T/.test(str)) {
    const d = new Date(str);
    if (!isNaN(d)) {
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
  }
  return str;
}
function normalizeTreinos(items) {
  return (items || []).map(t => ({
    ...t,
    Data: normDate(t.Data),
    Horario: normTime(t.Horario),
  }));
}

function toast(msg, type = 'success', ms = 3000) {
  const wrap = $('#toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; }, ms - 200);
  setTimeout(() => el.remove(), ms);
}
function showLoading(on) {
  $('#loadingOverlay').classList.toggle('open', on);
}
function openModal(id) {
  $(`#modal-${id}`).classList.add('open');
}
function closeAllModals() {
  $$('.modal-overlay').forEach(m => m.classList.remove('open'));
}

/* ===================== HEADER ===================== */
$('#userNameLabel').textContent = Session.nome || Session.email;
$('#logoutBtn').addEventListener('click', () => {
  if (confirm('Sair da conta?')) {
    Session.clear();
    window.location.replace('login.html');
  }
});

/* ===================== TABS ===================== */
function setTab(tab) {
  state.currentTab = tab;
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  $$('.section').forEach(s => s.classList.toggle('active', s.id === `section-${tab}`));
  location.hash = tab;
  if (tab === 'agenda')      renderAgenda();
  if (tab === 'alunos')      renderAlunos();
  if (tab === 'academias')   renderAcademias();
  if (tab === 'relatorios')  renderReportsTab();
}
$$('.tab-btn').forEach(b => b.addEventListener('click', () => setTab(b.dataset.tab)));
window.addEventListener('hashchange', () => {
  const t = location.hash.replace('#','');
  if (['agenda','alunos','academias','relatorios'].includes(t)) setTab(t);
});

/* ===================== INITIAL LOAD ===================== */
async function loadAll() {
  showLoading(true);
  try {
    const [a, g, t] = await Promise.all([
      API.list('alunos'),
      API.list('academias'),
      API.list('treinos'),
    ]);
    state.alunos = (a.items || []).filter(x => x.Ativo !== false && x.Ativo !== 'FALSE');
    state.academias = (g.items || []).filter(x => x.Ativo !== false && x.Ativo !== 'FALSE');
    state.treinos = normalizeTreinos(t.items);
    state.loaded = true;

    $('#badgeAlunos').textContent = state.alunos.length;
    $('#badgeAcademias').textContent = state.academias.length;

    const initialTab = location.hash.replace('#','') || 'agenda';
    setTab(['agenda','alunos','academias','relatorios'].includes(initialTab) ? initialTab : 'agenda');
  } catch (e) {
    toast('Erro ao carregar: ' + e.message, 'error', 5000);
  } finally {
    showLoading(false);
  }
}

/* ===================== AGENDA ===================== */
const dateDisplay = $('#dateDisplay');
const datePicker = $('#datePicker');

function setDate(iso) {
  state.currentDate = iso;
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dateDisplay.innerHTML = `<strong>${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}</strong> · ${y}`;
  datePicker.value = iso;
  $('#agendaWeekday').textContent = WEEKDAYS[dt.getDay()].label + (iso === todayISO() ? ' · hoje' : '');
  if (state.currentTab === 'agenda') renderAgenda();
}
$('#dateToday').addEventListener('click', () => setDate(todayISO()));
$('#datePrev').addEventListener('click', () => setDate(shiftDate(state.currentDate, -1)));
$('#dateNext').addEventListener('click', () => setDate(shiftDate(state.currentDate,  1)));
datePicker.addEventListener('change', (e) => {
  if (e.target.value) setDate(e.target.value);
});
function shiftDate(iso, days) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate() + days);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function renderAgenda() {
  const grid = $('#slotsGrid');
  const dayTreinos = state.treinos.filter(t => t.Data === state.currentDate);
  const weekday = weekdayFromISO(state.currentDate);

  grid.innerHTML = HOUR_SLOTS.map(slot => {
    const checkins = dayTreinos.filter(t => slotOfTime(t.Horario) === slot);
    const suggestedAlunos = state.alunos.filter(al => {
      const horarios = horariosArray(al.Horarios);
      return horarios.some(h =>
        h.weekday === weekday && slotOfTime(h.time) === slot
      );
    }).filter(al => !checkins.some(c => c.AlunoId === al.ID));

    return `
      <div class="slot ${checkins.length ? 'has-checkins' : ''}">
        <div class="slot-head">
          <div class="slot-time">${slot}</div>
          <div class="slot-count">${checkins.length ? `${checkins.length} treino${checkins.length>1?'s':''}` : ''}</div>
        </div>
        <div class="slot-body">
          ${checkins.map(c => renderCheckin(c)).join('')}
          ${suggestedAlunos.map(al => renderSuggestion(al, slot)).join('')}
          <button class="slot-add" data-slot="${slot}">+ Check-in</button>
        </div>
      </div>
    `;
  }).join('');

  // bind add buttons
  $$('#slotsGrid .slot-add').forEach(btn => {
    btn.addEventListener('click', () => openCheckinModal({ horario: btn.dataset.slot, data: state.currentDate }));
  });
  $$('#slotsGrid .checkin').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const treino = state.treinos.find(t => String(t.ID) === String(id));
      if (treino) openCheckinModal({ treino });
    });
  });
  $$('#slotsGrid .suggestion').forEach(el => {
    el.addEventListener('click', () => {
      openCheckinModal({
        horario: el.dataset.slot,
        data: state.currentDate,
        alunoId: el.dataset.aluno,
      });
    });
  });
}

function renderCheckin(t) {
  const aluno = state.alunos.find(a => String(a.ID) === String(t.AlunoId));
  const acad = state.academias.find(a => String(a.ID) === String(t.AcademiaId));
  const cor = gymColor(acad?.Cor || 'lime').hex;
  const muscs = muscArray(t.Musculos).slice(0,3);
  return `
    <div class="checkin" data-id="${t.ID}">
      <div class="checkin-name">${escapeHTML(aluno?.Nome || 'Aluno removido')}</div>
      <div class="checkin-meta">
        <span class="gym-dot" style="background:${cor}"></span>
        <span>${escapeHTML(acad?.Nome || '—')}</span>
        ${muscs.length ? `· ${muscs.map(m => muscLabel(m)).join(', ')}` : ''}
      </div>
    </div>
  `;
}
function renderSuggestion(al, slot) {
  return `
    <div class="suggestion" data-aluno="${al.ID}" data-slot="${slot}">
      <span>${escapeHTML(al.Nome)}</span>
      <span class="suggestion-label">SUGESTÃO</span>
    </div>
  `;
}
function muscLabel(id) {
  return (MUSCLE_GROUPS.find(m => m.id === id)?.label) || id;
}
function escapeHTML(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ===================== CHECK-IN MODAL ===================== */
function openCheckinModal({ treino, alunoId, horario, data } = {}) {
  $('#ci_id').value = treino?.ID || '';
  $('#checkinTitle').textContent = treino ? 'Editar treino' : 'Registrar treino';
  $('#ci_delete').style.display = treino ? 'inline-flex' : 'none';

  $('#ci_data').value = treino?.Data || data || todayISO();
  $('#ci_horario').value = treino?.Horario || horario || '08:00';

  const alunoSelect = $('#ci_aluno');
  alunoSelect.innerHTML = '<option value="">Selecione...</option>' +
    state.alunos.map(a => `<option value="${a.ID}">${escapeHTML(a.Nome)}</option>`).join('');
  alunoSelect.value = treino?.AlunoId || alunoId || '';

  const acadSelect = $('#ci_academia');
  acadSelect.innerHTML = '<option value="">Selecione...</option>' +
    state.academias.map(a => `<option value="${a.ID}">${escapeHTML(a.Nome)}</option>`).join('');
  acadSelect.value = treino?.AcademiaId || (state.academias[0]?.ID || '');

  const selectedMuscs = muscArray(treino?.Musculos);
  $('#ci_muscles').innerHTML = MUSCLE_GROUPS.map(m => `
    <div class="muscle-chip ${selectedMuscs.includes(m.id) ? 'selected' : ''}" data-id="${m.id}">${m.label}</div>
  `).join('');
  $$('#ci_muscles .muscle-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('selected'));
  });

  $('#ci_obs').value = treino?.Observacoes || '';
  openModal('checkin');
}

$('#ci_save').addEventListener('click', async () => {
  const id = $('#ci_id').value;
  const alunoId = $('#ci_aluno').value;
  const acadId = $('#ci_academia').value;
  if (!alunoId) return toast('Selecione um aluno.', 'error');
  if (!acadId) return toast('Selecione uma academia.', 'error');

  const muscs = $$('#ci_muscles .muscle-chip.selected').map(c => c.dataset.id);
  const fields = {
    alunoId,
    academiaId: acadId,
    data: $('#ci_data').value,
    horario: $('#ci_horario').value,
    musculos: muscs,                // array (backend faz .join)
    obs: $('#ci_obs').value.trim(), // backend lê body.obs
  };

  showLoading(true);
  try {
    if (id) {
      await API.update('treino', id, fields);
      toast('Treino atualizado.');
    } else {
      await API.create('treino', fields);
      toast('Treino registrado.');
    }
    closeAllModals();
    await reloadTreinos();
    if (state.currentTab === 'agenda') renderAgenda();
    if (state.currentTab === 'relatorios') renderReportsTab();
  } catch (e) {
    toast(e.message, 'error', 5000);
  } finally {
    showLoading(false);
  }
});

$('#ci_delete').addEventListener('click', async () => {
  const id = $('#ci_id').value;
  if (!id) return;
  if (!confirm('Excluir este treino? Esta ação não pode ser desfeita.')) return;
  showLoading(true);
  try {
    await API.remove('treino', id);
    toast('Treino excluído.');
    closeAllModals();
    await reloadTreinos();
    renderAgenda();
  } catch (e) {
    toast(e.message, 'error', 5000);
  } finally {
    showLoading(false);
  }
});

function renderScheduleEditor(horarios) {

function scheduleRowHTML(i, h = { weekday: 1, time: '08:00' }) {
  return `
    <div class="schedule-row" data-idx="${i}">
      <select class="sch-day">
        ${WEEKDAYS.map(w => `<option value="${w.id}" ${w.id === h.weekday ? 'selected' : ''}>${w.label}</option>`).join('')}
      </select>
      <input type="time" class="sch-time" value="${h.time || '08:00'}">
      <button type="button" class="sch-remove">✕</button>
    </div>
  `;
}
function bindScheduleRows() {
  $$('#al_schedule .sch-remove').forEach(b => {
    b.addEventListener('click', () => {
      b.closest('.schedule-row').remove();
    });
  });
}
$('#al_addSchedule').addEventListener('click', () => {
  const rows = $$('#al_schedule .schedule-row').length;
  $('#al_schedule').insertAdjacentHTML('beforeend', scheduleRowHTML(rows));
  bindScheduleRows();
});

function collectSchedule() {
  return $$('#al_schedule .schedule-row').map(row => ({
    weekday: parseInt(row.querySelector('.sch-day').value, 10),
    time: row.querySelector('.sch-time').value || '08:00',

}

/* ===================== RELATÓRIOS ===================== */
function renderReportsTab() {
  // popula selects
  const alunoSel = $('#reportAluno');
  if (!state.alunos.length) {
    $('#reportContent').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📊</div>
        <div class="empty-title">Sem dados ainda</div>
        <div class="empty-sub">Cadastre alunos e registre treinos pra ver relatórios.</div>
      </div>`;
    return;
  }
  if (alunoSel.options.length !== state.alunos.length) {
    alunoSel.innerHTML = state.alunos.map(a => `<option value="${a.ID}">${escapeHTML(a.Nome)}</option>`).join('');
  }

  const monthSel = $('#reportMonth');
  if (!monthSel.options.length) {
    const months = [];
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const dt = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const ym = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
      months.push(ym);
    }
    monthSel.innerHTML = months.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
  }

  renderReportContent();
}
function renderReportContent() {
  const alunoId = $('#reportAluno').value;
  const month = $('#reportMonth').value;
  if (!alunoId || !month) return;
  const aluno = state.alunos.find(a => String(a.ID) === String(alunoId));
  if (!aluno) return;

  const [y, m] = month.split('-').map(Number);
  const treinosNoMes = state.treinos.filter(t =>
    String(t.AlunoId) === String(alunoId) &&
    String(t.Data || '').startsWith(month)
  );

  // KPIs
  const diasTreinados = new Set(treinosNoMes.map(t => t.Data)).size;
  const daysInMonth = new Date(y, m, 0).getDate();
  const today = new Date();
  const isCurrentMonth = (today.getFullYear() === y && today.getMonth() + 1 === m);
  const daysSoFar = isCurrentMonth ? today.getDate() : daysInMonth;
  // aderência = dias treinados / dias úteis esperados; aqui usamos schedule do aluno
  const horarios = horariosArray(aluno.Horarios);
  const treinosEsperadosNoMes = horarios.length
    ? countExpectedSessions(horarios, y, m, daysSoFar)
    : null;
  const aderencia = treinosEsperadosNoMes
    ? Math.min(100, Math.round((treinosNoMes.length / treinosEsperadosNoMes) * 100))
    : null;

  // calendar
  const trainedDays = new Set(treinosNoMes.map(t => Number(String(t.Data).split('-')[2])));
  const firstWeekday = new Date(y, m-1, 1).getDay();
  let calHTML = WEEKDAYS.map(w => `<div class="cal-head">${w.short}</div>`).join('');
  for (let i = 0; i < firstWeekday; i++) calHTML += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = isCurrentMonth && d === today.getDate();
    const trained = trainedDays.has(d);
    calHTML += `<div class="cal-day ${trained ? 'trained' : ''} ${isToday ? 'today' : ''}">${d}</div>`;
  }

  // muscle chart
  const muscleCounts = {};
  treinosNoMes.forEach(t => {
    muscArray(t.Musculos).forEach(m => {
      muscleCounts[m] = (muscleCounts[m] || 0) + 1;
    });
  });
  const muscleEntries = Object.entries(muscleCounts).sort((a,b) => b[1] - a[1]);
  const maxMuscleCount = muscleEntries[0]?.[1] || 1;
  const muscleHTML = muscleEntries.length ? muscleEntries.map(([id, count]) => `
    <div class="bar-row">
      <div class="bar-label">${muscLabel(id)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(count/maxMuscleCount)*100}%"></div></div>
      <div class="bar-count">${count}</div>
    </div>
  `).join('') : `<div class="empty-sub" style="text-align:center">Nenhum grupo registrado neste mês.</div>`;

  // gym distribution
  const gymCounts = {};
  treinosNoMes.forEach(t => {
    gymCounts[t.AcademiaId] = (gymCounts[t.AcademiaId] || 0) + 1;
  });
  const gymHTML = Object.entries(gymCounts).map(([id, count]) => {
    const ac = state.academias.find(a => String(a.ID) === String(id));
    const cor = gymColor(ac?.Cor || 'lime').hex;
    return `
      <div class="gym-row">
        <span class="gym-dot" style="background:${cor}"></span>
        <span class="gym-row-name">${escapeHTML(ac?.Nome || 'Academia removida')}</span>
        <span class="gym-row-count">${count} treino${count !== 1 ? 's' : ''}</span>
      </div>
    `;
  }).join('');

  $('#reportContent').innerHTML = `
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Treinos no mês</div>
        <div class="kpi-value">${treinosNoMes.length}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Dias treinados</div>
        <div class="kpi-value">${diasTreinados}<span class="unit">/${daysInMonth}</span></div>
      </div>
      ${aderencia !== null ? `
      <div class="kpi">
        <div class="kpi-label">Aderência</div>
        <div class="kpi-value">${aderencia}<span class="unit">%</span></div>
        <div class="kpi-sub">${treinosNoMes.length}/${treinosEsperadosNoMes} esperados</div>
      </div>` : `
      <div class="kpi">
        <div class="kpi-label">Aderência</div>
        <div class="kpi-value" style="color:var(--muted)">—</div>
        <div class="kpi-sub">Defina horários fixos do aluno</div>
      </div>`}
      <div class="kpi">
        <div class="kpi-label">Grupos únicos</div>
        <div class="kpi-value">${muscleEntries.length}</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Calendário · ${monthLabel(month)}</div>
      <div class="calendar">${calHTML}</div>
    </div>

    <div class="panel">
      <div class="panel-title">Grupos musculares trabalhados</div>
      ${muscleHTML}
    </div>

    ${gymHTML ? `
    <div class="panel">
      <div class="panel-title">Distribuição por academia</div>
      ${gymHTML}
    </div>` : ''}
  `;
}

function countExpectedSessions(horarios, y, m, untilDay) {
  let count = 0;
  for (let d = 1; d <= untilDay; d++) {
    const wd = new Date(y, m-1, d).getDay();
    if (horarios.some(h => h.weekday === wd)) count++;
  }
  return count;
}

$('#reportAluno').addEventListener('change', renderReportContent);
$('#reportMonth').addEventListener('change', renderReportContent);

$('#exportTextBtn').addEventListener('click', () => {
  const alunoId = $('#reportAluno').value;
  const month = $('#reportMonth').value;
  if (!alunoId || !month) return toast('Selecione aluno e mês.', 'error');
  const aluno = state.alunos.find(a => String(a.ID) === String(alunoId));
  const treinosNoMes = state.treinos.filter(t =>
    String(t.AlunoId) === String(alunoId) &&
    String(t.Data || '').startsWith(month)
  ).sort((a,b) => String(a.Data).localeCompare(String(b.Data)));

  const muscleCounts = {};
  treinosNoMes.forEach(t => muscArray(t.Musculos).forEach(m => {
    muscleCounts[m] = (muscleCounts[m] || 0) + 1;
  }));
  const topMusculos = Object.entries(muscleCounts).sort((a,b) => b[1]-a[1])
    .slice(0,5).map(([id, c]) => `${muscLabel(id)} (${c})`).join(', ');

  const lines = [
    `📊 *${aluno?.Nome || 'Aluno'} · ${monthLabel(month)}*`,
    ``,
    `Treinos: *${treinosNoMes.length}*`,
    `Dias treinados: *${new Set(treinosNoMes.map(t => t.Data)).size}*`,
    topMusculos ? `Foco: ${topMusculos}` : null,
    ``,
    `_Datas:_`,
    ...treinosNoMes.map(t => {
      const ac = state.academias.find(a => String(a.ID) === String(t.AcademiaId));
      const muscs = muscArray(t.Musculos).slice(0,4).map(muscLabel).join(', ');
      return `• ${fmtDate(t.Data)} ${t.Horario || ''} · ${ac?.Nome || '—'}${muscs ? ` · ${muscs}` : ''}`;
    }),
    ``,
    `— enviado via FitHub Personal`,
  ].filter(Boolean);

  $('#exportText').textContent = lines.join('\n');
  openModal('export');
});
$('#copyExport').addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText($('#exportText').textContent);
    toast('Texto copiado.');
  } catch {
    toast('Não foi possível copiar. Selecione e copie manualmente.', 'error');
  }
});
